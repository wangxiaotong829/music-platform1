    <script>
        let currentUser = null;
        let currentWork = null;
        let works = [];
        let currentCategory = 'all';
        let currentSort = 'newest';

        // 初始化
        document.addEventListener('DOMContentLoaded', async () => {
            await checkSession();
            await loadAllData();
            initUpload();
            initForms();
            renderWorks();
            renderRankingPreview();
        });

        // 检查登录状态
        async function checkSession() {
            const { data: { user } } = await supabase.auth.getUser();
            if (user) {
                const { data: profile } = await supabase
                    .from('profiles')
                    .select('*')
                    .eq('id', user.id)
                    .single();
                currentUser = {
                    id: user.id,
                    email: user.email,
                    nickname: profile?.nickname || user.email,
                    avatar: profile?.avatar_url || 'https://aka.doubaocdn.com/s/2Pjs1wGJ9Q'
                };
                localStorage.setItem('music_platform_currentUser', JSON.stringify(currentUser));
            } else {
                currentUser = null;
                localStorage.removeItem('music_platform_currentUser');
            }
            checkLoginStatus();
        }

        function checkLoginStatus() {
            if (currentUser) {
                document.getElementById('guestButtons').classList.add('hidden');
                document.getElementById('userMenu').classList.remove('hidden');
                document.getElementById('navUserName').innerText = currentUser.nickname;
                document.getElementById('navUserAvatar').src = currentUser.avatar;
            } else {
                document.getElementById('guestButtons').classList.remove('hidden');
                document.getElementById('userMenu').classList.add('hidden');
            }
        }

        // 加载所有作品
        async function loadAllData() {
            let query = supabase.from('works').select('*, profiles(nickname, avatar_url)');
            if (currentCategory !== 'all') {
                query = query.eq('category', currentCategory);
            }
            if (currentSort === 'hot') {
                query = query.order('play_count', { ascending: false });
            } else if (currentSort === 'comment') {
                query = query.order('comment_count', { ascending: false });
            } else {
                query = query.order('created_at', { ascending: false });
            }
            const { data } = await query;
            works = data || [];
        }

        // 渲染作品列表
        function renderWorks() {
            const grid = document.getElementById('worksGrid');
            const empty = document.getElementById('emptyWorks');
            const list = works.filter(w => w.is_public === true);
            if (!list.length) {
                grid.innerHTML = '';
                empty.classList.remove('hidden');
                return;
            }
            empty.classList.add('hidden');
            grid.innerHTML = list.map(w => `
                <div class="bg-white rounded-xl shadow-sm hover:shadow-md cursor-pointer" onclick="openWorkDetail(${w.id})">
                    <div class="relative">
                        <img src="${w.cover_url || 'https://aka.doubaocdn.com/s/ygh51wGJ9P'}" class="w-full h-48 object-cover rounded-t-xl">
                        <div class="absolute bottom-2 right-2 w-10 h-10 rounded-full bg-primary/80 flex items-center justify-center text-white">
                            <i class="fa fa-play"></i>
                        </div>
                    </div>
                    <div class="p-4">
                        <h3 class="font-medium truncate">${escapeHtml(w.name)}</h3>
                        <p class="text-sm text-gray-500">${escapeHtml(w.profiles?.nickname || '未知')}</p>
                    </div>
                </div>
            `).join('');
        }

        // 打开作品详情
        async function openWorkDetail(workId) {
            const work = works.find(w => w.id === workId);
            if (!work) return;
            currentWork = work;
            document.getElementById('detailTitle').textContent = work.name;
            document.getElementById('detailProducerName').textContent = work.profiles?.nickname || '未知';
            document.getElementById('detailInspiration').textContent = work.inspiration;
            document.getElementById('audioPlayer').src = work.file_url;
            document.getElementById('detailPlayCount').textContent = work.play_count;
            document.getElementById('detailCommentCount').textContent = work.comment_count;
            // 增加播放计数
            await supabase.rpc('increment_play_count', { work_id: work.id });
            work.play_count++;
            // 加载评论
            await loadComments(work.id);
            showPage('workDetail');
        }

        // 加载评论
        async function loadComments(workId) {
            const { data } = await supabase
                .from('comments')
                .select('*, profiles(nickname, avatar_url)')
                .eq('work_id', workId)
                .order('created_at', { ascending: false });
            const container = document.getElementById('commentsList');
            if (!data || data.length === 0) {
                container.innerHTML = '<p class="text-center text-gray-500">暂无评论，快来抢沙发吧~</p>';
                return;
            }
            container.innerHTML = data.map(c => `
                <div class="flex gap-3">
                    <img src="${c.profiles?.avatar_url || 'https://aka.doubaocdn.com/s/2Pjs1wGJ9Q'}" class="w-10 h-10 rounded-full">
                    <div class="flex-1">
                        <div class="flex items-center gap-2">
                            <span class="font-medium">${escapeHtml(c.profiles?.nickname || '匿名')}</span>
                            <span class="text-xs text-gray-400">${new Date(c.created_at).toLocaleString()}</span>
                        </div>
                        <p class="text-gray-700 mt-1">${escapeHtml(c.content)}</p>
                    </div>
                </div>
            `).join('');
        }

        // 提交评论
        async function submitComment() {
            if (!currentUser) return alert('请先登录');
            const content = document.getElementById('newComment').value.trim();
            if (!content) return alert('评论内容不能为空');
            const { error } = await supabase.from('comments').insert({
                work_id: currentWork.id,
                user_id: currentUser.id,
                content: content
            });
            if (error) {
                alert('评论失败：' + error.message);
                return;
            }
            // 更新作品评论数
            await supabase.rpc('increment_comment_count', { work_id: currentWork.id });
            currentWork.comment_count++;
            document.getElementById('detailCommentCount').textContent = currentWork.comment_count;
            document.getElementById('newComment').value = '';
            await loadComments(currentWork.id);
            alert('评论成功');
        }

        // 排行榜预览
        async function renderRankingPreview() {
            const { data } = await supabase
                .from('works')
                .select('*, profiles(nickname)')
                .order('play_count', { ascending: false })
                .limit(5);
            const container = document.getElementById('rankingPreview');
            if (!data || data.length === 0) {
                container.innerHTML = '<p class="text-gray-500">暂无数据</p>';
                return;
            }
            container.innerHTML = data.map((w, idx) => `
                <div class="flex items-center gap-3 p-2 hover:bg-gray-50 rounded-lg cursor-pointer" onclick="openWorkDetail(${w.id})">
                    <span class="w-6 text-center font-bold ${idx < 3 ? 'text-primary' : 'text-gray-400'}">${idx+1}</span>
                    <img src="${w.cover_url || 'https://aka.doubaocdn.com/s/ygh51wGJ9P'}" class="w-10 h-10 rounded object-cover">
                    <div class="flex-1">
                        <p class="text-sm font-medium truncate">${escapeHtml(w.name)}</p>
                        <p class="text-xs text-gray-500">${escapeHtml(w.profiles?.nickname || '未知')}</p>
                    </div>
                    <span class="text-xs text-gray-400">${w.play_count}次播放</span>
                </div>
            `).join('');
        }

        // 完整排行榜页
        async function renderFullRanking() {
            const { data } = await supabase
                .from('works')
                .select('*, profiles(nickname)')
                .order('play_count', { ascending: false });
            const container = document.getElementById('rankingList');
            if (!data || data.length === 0) {
                container.innerHTML = '<p class="text-center text-gray-500">暂无作品</p>';
                return;
            }
            container.innerHTML = data.map((w, idx) => `
                <div class="bg-white rounded-lg shadow-sm p-4 flex items-center gap-4 cursor-pointer hover:shadow-md" onclick="openWorkDetail(${w.id})">
                    <div class="w-12 text-center">
                        <span class="text-2xl font-bold ${idx < 3 ? 'text-primary' : 'text-gray-400'}">${idx+1}</span>
                    </div>
                    <img src="${w.cover_url || 'https://aka.doubaocdn.com/s/ygh51wGJ9P'}" class="w-16 h-16 rounded object-cover">
                    <div class="flex-1">
                        <h3 class="font-bold">${escapeHtml(w.name)}</h3>
                        <p class="text-sm text-gray-500">${escapeHtml(w.profiles?.nickname || '未知')}</p>
                    </div>
                    <div class="text-right">
                        <p class="text-sm text-gray-500">${w.play_count} 播放</p>
                        <p class="text-sm text-gray-500">${w.comment_count} 评论</p>
                    </div>
                </div>
            `).join('');
        }

        // 我的作品
        async function loadMyWorks() {
            if (!currentUser) {
                alert('请先登录');
                showPage('home');
                return;
            }
            const { data } = await supabase
                .from('works')
                .select('*')
                .eq('user_id', currentUser.id)
                .order('created_at', { ascending: false });
            const container = document.getElementById('myWorksGrid');
            if (!data || data.length === 0) {
                container.innerHTML = '<p class="text-center text-gray-500">你还没有上传过作品</p>';
                return;
            }
            container.innerHTML = data.map(w => `
                <div class="bg-white rounded-xl shadow-sm hover:shadow-md cursor-pointer" onclick="openWorkDetail(${w.id})">
                    <div class="relative">
                        <img src="${w.cover_url || 'https://aka.doubaocdn.com/s/ygh51wGJ9P'}" class="w-full h-48 object-cover rounded-t-xl">
                    </div>
                    <div class="p-4">
                        <h3 class="font-medium truncate">${escapeHtml(w.name)}</h3>
                        <p class="text-sm text-gray-500">${new Date(w.created_at).toLocaleDateString()}</p>
                    </div>
                </div>
            `).join('');
        }

        // 个人中心加载资料
        async function loadProfile() {
            if (!currentUser) return;
            document.getElementById('profileAvatar').src = currentUser.avatar;
            document.getElementById('profileNickname').textContent = currentUser.nickname;
            document.getElementById('profileEmail').textContent = currentUser.email;
            document.getElementById('editNickname').value = currentUser.nickname;
        }

        async function updateProfile() {
            const newNickname = document.getElementById('editNickname').value.trim();
            if (!newNickname) return alert('昵称不能为空');
            const { error } = await supabase
                .from('profiles')
                .update({ nickname: newNickname })
                .eq('id', currentUser.id);
            if (error) {
                alert('更新失败：' + error.message);
                return;
            }
            currentUser.nickname = newNickname;
            localStorage.setItem('music_platform_currentUser', JSON.stringify(currentUser));
            checkLoginStatus();
            alert('更新成功');
            loadProfile();
        }

        // 上传作品
        function initUpload() {
            const dropZone = document.getElementById('dropZone');
            const fileInput = document.getElementById('fileInput');
            dropZone.onclick = () => fileInput.click();
            fileInput.onchange = (e) => {
                if (fileInput.files.length) {
                    dropZone.classList.add('border-primary');
                }
            };
        }

        // 表单提交处理
        function initForms() {
            document.getElementById('loginForm').onsubmit = async (e) => {
                e.preventDefault();
                const email = document.getElementById('loginEmail').value;
                const password = document.getElementById('loginPassword').value;
                const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                if (error) return alert('登录失败：' + error.message);
                await checkSession();
                hideModal('loginModal');
                alert('登录成功');
                await loadAllData();
                renderWorks();
            };

            document.getElementById('registerForm').onsubmit = async (e) => {
                e.preventDefault();
                const nickname = document.getElementById('registerNickname').value;
                const email = document.getElementById('registerEmail').value;
                const password = document.getElementById('registerPassword').value;
                const { data, error } = await supabase.auth.signUp({ email, password });
                if (error) return alert('注册失败：' + error.message);
                // 自动插入 profile
                const { error: profileError } = await supabase
                    .from('profiles')
                    .insert({ id: data.user.id, nickname: nickname });
                if (profileError) console.error('profile插入失败', profileError);
                alert('注册成功，请登录');
                hideModal('registerModal');
                showModal('loginModal');
            };

            document.getElementById('uploadForm').onsubmit = async (e) => {
                e.preventDefault();
                if (!currentUser) return alert('请先登录');
                const file = document.getElementById('fileInput').files[0];
                if (!file) return alert('请选择音频文件');
                const fileName = `${currentUser.id}/${Date.now()}_${file.name}`;
                const { error: uploadError } = await supabase.storage
                    .from('music-files')
                    .upload(fileName, file);
                if (uploadError) return alert('上传失败：' + uploadError.message);
                const { data: { publicUrl } } = supabase.storage
                    .from('music-files')
                    .getPublicUrl(fileName);
                const work = {
                    user_id: currentUser.id,
                    name: document.getElementById('workName').value,
                    category: document.getElementById('workCategory').value,
                    inspiration: document.getElementById('workInspiration').value,
                    file_url: publicUrl,
                    is_public: true,
                    play_count: 0,
                    comment_count: 0
                };
                const { error: insertError } = await supabase.from('works').insert([work]);
                if (insertError) return alert('保存失败：' + insertError.message);
                alert('上传成功！');
                showPage('home');
                await loadAllData();
                renderWorks();
            };
        }

        // 辅助函数
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // 页面切换
        function showPage(page) {
            document.querySelectorAll('.page-section').forEach(el => el.classList.add('hidden'));
            document.getElementById(page + 'Page').classList.remove('hidden');
            if (page === 'ranking') renderFullRanking();
            if (page === 'profile') loadProfile();
            if (page === 'myWorks') loadMyWorks();
        }

        function filterWorks(category) {
            currentCategory = category;
            loadAllData().then(() => renderWorks());
            // 更新按钮样式
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.classList.remove('bg-primary', 'text-white');
                btn.classList.add('bg-gray-100', 'text-gray-600');
            });
            event.target.classList.add('bg-primary', 'text-white');
        }

        function sortWorks(type) {
            currentSort = type;
            loadAllData().then(() => renderWorks());
            document.querySelectorAll('.sort-btn').forEach(btn => {
                btn.classList.remove('bg-primary', 'text-white');
                btn.classList.add('bg-gray-100', 'text-gray-600');
            });
            event.target.classList.add('bg-primary', 'text-white');
        }

        function showModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function hideModal(id) { document.getElementById(id).classList.add('hidden'); }
        function goBack() { showPage('home'); }
        function switchDetailTab(tab) {
            document.getElementById('detailInfoTab').classList.toggle('hidden', tab !== 'info');
            document.getElementById('detailCommentsTab').classList.toggle('hidden', tab !== 'comments');
        }
        async function logout() {
            await supabase.auth.signOut();
            currentUser = null;
            localStorage.removeItem('music_platform_currentUser');
            checkLoginStatus();
            showPage('home');
            await loadAllData();
            renderWorks();
        }
        function toggleUserDropdown() { document.getElementById('userDropdown').classList.toggle('hidden'); }
        function toggleMobileMenu() { document.getElementById('mobileMenu').classList.toggle('hidden'); }
    </script>
</body>
</html>
