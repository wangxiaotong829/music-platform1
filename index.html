<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音乐交流平台</title>
    <style>
        * {margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif;}
        body {background: #f5f5f5; padding: 20px;}
        .container {max-width: 1000px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px #0000001a;}
        h1 {text-align: center; margin-bottom: 20px; color: #333;}
        .login-box, .upload-box, .list-box {margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 8px;}
        input, button, textarea {width: 100%; margin: 8px 0; padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 16px;}
        button {background: #42b983; color: white; border: none; cursor: pointer;}
        button:hover {background: #359469;}
        .item {padding: 10px; border-bottom: 1px solid #eee;}
        .item h4 {color: #333; margin-bottom: 5px;}
        .item p {color: #666; font-size: 14px;}
        .hidden {display: none;}
    </style>
</head>
<body>
    <div class="container">
        <h1>音乐交流平台</h1>

        <!-- 登录 -->
        <div class="login-box" id="loginBox">
            <input type="text" id="username" placeholder="用户名">
            <input type="password" id="password" placeholder="密码">
            <button onclick="login()">登录 / 注册</button>
        </div>

        <!-- 上传 -->
        <div class="upload-box hidden" id="uploadBox">
            <input type="text" id="musicName" placeholder="作品名称">
            <input type="file" id="musicFile" accept="audio/*">
            <button onclick="uploadMusic()">上传作品</button>
        </div>

        <!-- 作品列表 -->
        <div class="list-box">
            <h3>最新作品</h3>
            <div id="musicList"></div>
        </div>
    </div>

    <script>
        let currentUser = null;
        let db = JSON.parse(localStorage.getItem('musicPlatform')) || {users: [], musics: []};

        function saveDB() {localStorage.setItem('musicPlatform', JSON.stringify(db));}

        // 登录
        function login() {
            let user = document.getElementById('username').value;
            let pwd = document.getElementById('password').value;
            if(!user||!pwd)return alert('请输入账号密码');
            
            let find = db.users.find(i=>i.name===user);
            if(!find) {db.users.push({name:user,pwd:pwd});}
            else {if(find.pwd!==pwd)return alert('密码错误');}
            
            currentUser = user;
            document.getElementById('loginBox').classList.add('hidden');
            document.getElementById('uploadBox').classList.remove('hidden');
            saveDB();
            refreshList();
            alert('登录成功');
        }

        // 上传
        function uploadMusic() {
            let name = document.getElementById('musicName').value;
            let file = document.getElementById('musicFile').files[0];
            if(!name||!file)return alert('请填写完整信息');
            
            let url = URL.createObjectURL(file);
            db.musics.push({
                user:currentUser, name:name, url:url, time:new Date().toLocaleString()
            });
            saveDB();
            refreshList();
            alert('上传成功！');
        }

        // 刷新列表
        function refreshList() {
            let list = document.getElementById('musicList');
            list.innerHTML = '';
            db.musics.slice().reverse().forEach(m=>{
                let div = document.createElement('div');
                div.className='item';
                div.innerHTML = `<h4>${m.name}</h4><p>作者：${m.user} | ${m.time}</p><audio controls src="${m.url}"></audio>`;
                list.appendChild(div);
            });
        }

        window.onload = refreshList;
    </script>
</body>
</html>
